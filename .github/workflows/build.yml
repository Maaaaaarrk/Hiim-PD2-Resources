name: Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run build.py
        run: python build.py

      - name: Commit changed root files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- *.html *.md *.json *.js *.css
          git diff --cached --quiet && echo "No changes." || (
            git commit -m "build: auto-update generated files [skip ci]" &&
            git push
          )
