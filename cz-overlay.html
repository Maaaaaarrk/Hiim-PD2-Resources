<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CZ Overlay</title>
<style>
/* --- URL Parameters ---
 * count  = number of zones to show (default: 3)
 * acts   = comma-separated act filter, e.g. acts=1,3,5 (default: all)
 * tags   = EXP, MF, or EXP,MF — only show zones with these tags (default: all)
 * theme  = dark (default) or light
 * align  = left (default), center, or right
 * scale  = font scale multiplier, e.g. 1.2 (default: 1)
 * title  = 0 to hide the header row (default: 1)
 * zones  = comma-separated zone indices to show (default: all)
 *
 * Example: cz-overlay.html?count=5&acts=1,3&tags=EXP&align=right&scale=1.1
 */

*{margin:0;padding:0;box-sizing:border-box}
body{
  background:transparent;
  font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
  color:#e0e0e0;
  padding:10px;
  overflow:hidden;
}
body.theme-light{color:#1a1a1a}

#overlay{
  display:inline-flex;
  flex-direction:column;
  gap:4px;
  background:rgba(0,0,0,0.7);
  border-radius:8px;
  padding:10px 14px;
  min-width:320px;
  max-width:600px;
}
body.theme-light #overlay{background:rgba(255,255,255,0.8)}

body.align-center{display:flex;justify-content:center}
body.align-right{display:flex;justify-content:flex-end}

.overlay-title{
  font-size:.7rem;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:1px;
  color:#888;
  margin-bottom:2px;
}

.zone-row{
  display:flex;
  align-items:center;
  gap:8px;
  padding:4px 0;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.zone-row:last-child{border-bottom:none}
body.theme-light .zone-row{border-bottom-color:rgba(0,0,0,0.08)}

.status{
  font-size:.65rem;
  font-weight:700;
  text-transform:uppercase;
  width:52px;
  flex-shrink:0;
  text-align:center;
  border-radius:3px;
  padding:2px 0;
}
.status.live{background:#22c55e;color:#fff}
.status.next{background:rgba(255,255,255,0.1);color:#9ca3af}
body.theme-light .status.next{background:rgba(0,0,0,0.08);color:#666}

.act-badge{
  font-size:.6rem;
  font-weight:700;
  border-radius:3px;
  padding:1px 6px;
  flex-shrink:0;
}
.act-1{background:#6366f1;color:#fff}
.act-2{background:#f59e0b;color:#000}
.act-3{background:#10b981;color:#fff}
.act-4{background:#ef4444;color:#fff}
.act-5{background:#3b82f6;color:#fff}

.zone-name{
  flex:1;
  font-size:.85rem;
  font-weight:500;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.tag{font-size:.55rem;font-weight:700;border-radius:2px;padding:1px 4px}
.tag-exp{background:#06b6d4;color:#fff}
.tag-mf{background:#eab308;color:#000}

.timer{
  font-size:.75rem;
  color:#9ca3af;
  flex-shrink:0;
  min-width:48px;
  text-align:right;
  font-variant-numeric:tabular-nums;
}
body.theme-light .timer{color:#666}
</style>
</head>
<body>
<div id="overlay"></div>
<script src="cz-data.js"></script>
<script>
(function(){
var zones=window.czData.zones;
var zoneAct=window.czData.zoneAct;
var expZones=new Set(window.czData.expZones);
var mfZones=new Set(window.czData.mfZones);

/* Parse URL params */
var params=new URLSearchParams(window.location.search);
var count=parseInt(params.get("count"))||3;
var actFilter=null;
if(params.get("acts")){actFilter=new Set(params.get("acts").split(",").map(Number))}
var tagFilter=null;
if(params.get("tags")){
  var t=params.get("tags").toUpperCase().split(",");
  tagFilter=new Set();
  for(var i=0;i<zones.length;i++){
    for(var j=0;j<t.length;j++){
      if(t[j]==="EXP"&&expZones.has(i))tagFilter.add(i);
      if(t[j]==="MF"&&mfZones.has(i))tagFilter.add(i);
    }
  }
}
var zoneFilter=null;
if(params.get("zones")){zoneFilter=new Set(params.get("zones").split(",").map(Number))}
var theme=params.get("theme")||"dark";
var align=params.get("align")||"left";
var scale=parseFloat(params.get("scale"))||1;
var showTitle=params.get("title")!=="0";

if(theme==="light")document.body.classList.add("theme-light");
if(align==="center")document.body.classList.add("align-center");
if(align==="right")document.body.classList.add("align-right");
if(scale!==1)document.getElementById("overlay").style.fontSize=scale+"rem";

var getNextPrng=function(seed,mul,inc){return Number(((BigInt(seed)*BigInt(mul)+BigInt(inc))>>BigInt(16))&BigInt(32767))};
var getZone=function(ts,n){
  n=n||0;ts=~~(ts/900e3)*900e3;ts+=900e3*n;
  var a=~~(ts/900000);var b=~~(ts/86400000);var seed=a+b;
  var idx=getNextPrng(seed,214013,2531011)%zones.length;
  return{zone:zones[idx],act:zoneAct[idx],ts:ts,idx:idx};
};
var isVisible=function(idx){
  if(zoneFilter)return zoneFilter.has(idx);
  if(actFilter&&!actFilter.has(zoneAct[idx]))return false;
  if(tagFilter&&!tagFilter.has(idx))return false;
  return true;
};
var formatCountdown=function(d){
  if(d<=0)return"NOW";
  var s=Math.ceil(d/1000);
  var m=Math.floor(s/60);var sec=s%60;
  if(m<60)return m+"m "+String(sec).padStart(2,"0")+"s";
  var h=Math.floor(m/60);return h+"h "+String(m%60).padStart(2,"0")+"m";
};

var overlay=document.getElementById("overlay");
var render=function(){
  var now=Date.now();
  var list=[];
  for(var i=0;list.length<count;i++){
    var info=getZone(now,i);
    if(isVisible(info.idx))list.push(info);
    if(i>500)break;
  }
  var html="";
  if(showTitle)html+='<div class="overlay-title">Corrupted Zones</div>';
  for(var j=0;j<list.length;j++){
    var z=list[j];
    var isLive=now>=z.ts&&now<z.ts+900e3;
    var diff=z.ts-now;
    html+='<div class="zone-row">';
    html+='<span class="status '+(isLive?"live":"next")+'">'+(isLive?"LIVE":"Next")+'</span>';
    html+='<span class="act-badge act-'+z.act+'">A'+z.act+'</span>';
    html+='<span class="zone-name">'+z.zone+'</span>';
    if(expZones.has(z.idx))html+='<span class="tag tag-exp">EXP</span>';
    if(mfZones.has(z.idx))html+='<span class="tag tag-mf">MF</span>';
    html+='<span class="timer">'+(isLive?formatCountdown(z.ts+900e3-now):formatCountdown(diff))+'</span>';
    html+='</div>';
  }
  overlay.innerHTML=html;
};
render();
setInterval(render,1000);
})();
</script>
</body>
</html>
