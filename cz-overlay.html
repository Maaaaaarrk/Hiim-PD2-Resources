<!DOCTYPE html>
<html lang="en">
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-MFHSCHGQ9Y"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-MFHSCHGQ9Y");</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CZ Overlay</title>
<style>
/* --- URL Parameters ---
 * count  = number of zones to show (default: 3)
 * acts   = comma-separated act filter, e.g. acts=1,3,5 (default: all)
 * tags   = TOP, GOOD, RED, or combinations like TOP,GOOD,RED — only show zones with these tags (default: all)
 * theme  = dark (default) or light
 * align  = left (default), center, or right
 * scale  = font scale multiplier, e.g. 1.2 (default: 1)
 * title  = 0 to hide the header row (default: 1)
 * zones  = comma-separated zone indices to show (default: all)
 * resist = comma-separated damage types to exclude, e.g. resist=fire,cold
 *          hides zones where monsters are immune to any listed type
 *          valid types: fire, cold, lightning, poison, physical, magic
 * sound  = 1 to enable sound notification when a new zone rotation starts (default: off)
 * mini   = 1 to enable minified mode — compact layout, no LIVE/Next labels,
 *          countdown badges (green=active, yellow=starting soon), zone names truncated at 140px
 *
 * infinity = 1 to enable Infinity mode — fire/cold/lightning immunities at 117 res or lower
 *            are treated as broken (shown with strikethrough). Does not affect physical/poison/magic.
 *
 * Example: cz-overlay.html?count=5&acts=1,3&tags=TOP,RED&align=right&scale=1.1&mini=1&infinity=1
 */

*{margin:0;padding:0;box-sizing:border-box}
body{
  background:transparent;
  font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
  color:#e0e0e0;
  padding:10px;
  overflow:hidden;
}
body.theme-light{color:#1a1a1a}

#overlay{
  display:inline-flex;
  flex-direction:column;
  gap:4px;
  background:rgba(0,0,0,0.7);
  border-radius:8px;
  padding:10px 14px;
  min-width:320px;
  max-width:600px;
}
body.theme-light #overlay{background:rgba(255,255,255,0.8)}

body.align-center{display:flex;justify-content:center}
body.align-right{display:flex;justify-content:flex-end}

.overlay-title{
  font-size:.7rem;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:1px;
  color:#888;
  margin-bottom:2px;
}

.zone-row{
  display:flex;
  align-items:center;
  gap:8px;
  padding:4px 0;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.zone-row:last-child{border-bottom:none}
body.theme-light .zone-row{border-bottom-color:rgba(0,0,0,0.08)}

.status{
  font-size:.65rem;
  font-weight:700;
  text-transform:uppercase;
  width:52px;
  flex-shrink:0;
  text-align:center;
  border-radius:3px;
  padding:2px 0;
}
.status.live{background:#22c55e;color:#fff}
.status.next{background:rgba(255,255,255,0.1);color:#9ca3af}
body.theme-light .status.next{background:rgba(0,0,0,0.08);color:#666}

.act-badge{
  font-size:.6rem;
  font-weight:700;
  border-radius:3px;
  padding:1px 6px;
  flex-shrink:0;
}
.act-1{background:#6366f1;color:#fff}
.act-2{background:#f59e0b;color:#000}
.act-3{background:#10b981;color:#fff}
.act-4{background:#ef4444;color:#fff}
.act-5{background:#3b82f6;color:#fff}

.zone-name{
  flex:1;
  font-size:.85rem;
  font-weight:500;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.tag{font-size:.55rem;font-weight:700;border-radius:2px;padding:1px 4px}
.tag-top{background:#22c55e;color:#fff}
.tag-good{background:#3b82f6;color:#fff}
.tag-red{background:#ef4444;color:#fff}

.immune{font-size:.45rem;font-weight:600;border-radius:2px;padding:1px 3px}
.immune-fire{background:#c03030;color:#fff}.immune-cold{background:#4488dd;color:#fff}.immune-lightning{background:#d4a017;color:#000}.immune-poison{background:#00aa00;color:#fff}.immune-physical{background:#888;color:#fff}.immune-magic{background:#9060c0;color:#fff}
.immune.broken{opacity:.35;text-decoration:line-through}

.timer{
  font-size:.75rem;
  color:#9ca3af;
  flex-shrink:0;
  min-width:48px;
  text-align:right;
  font-variant-numeric:tabular-nums;
}
body.theme-light .timer{color:#666}

/* Mini mode */
body.mini{padding:0}
body.mini #overlay{padding:0 8px;gap:0;min-width:auto;border-radius:0}
body.mini .zone-row{gap:4px;padding:0;line-height:1}
body.mini .overlay-title{margin-bottom:0}
body.mini .zone-name-wrap{position:relative;width:180px;flex-shrink:0;overflow:hidden;white-space:nowrap}
body.mini .zone-name-wrap .zone-name{flex:none;display:inline;max-width:none;overflow:visible}
body.mini .zone-tags{position:absolute;right:0;top:0;bottom:0;display:flex;gap:0;align-items:stretch}
body.mini .zone-tags .tag{padding:0 3px;display:flex;align-items:center}
body.mini .timer{
  border-radius:0;padding:0 6px;text-align:center;font-weight:600;color:#9ca3af;background:rgba(255,255,255,0.08);min-width:68px;margin-left:auto;align-self:stretch;display:flex;align-items:center;justify-content:center;
}
body.mini .act-badge{border-radius:0;padding:0 6px;align-self:stretch;display:flex;align-items:center}
body.mini .tag{border-radius:0}
body.mini .timer.timer-live{background:#22c55e;color:#fff}
body.mini .timer.timer-soon{background:#eab308;color:#000}
</style>
</head>
<body>
<div id="overlay"></div>
<script src="cz-data.js"></script>
<script>
(function(){
var zones=window.czData.zones;
var zoneAct=window.czData.zoneAct;
var topZones=new Set(window.czData.topZones);
var goodZones=new Set(window.czData.goodZones);
var redZones=new Set(window.czData.redZones);
var zoneImmunities=window.czData.zoneImmunities||{};

/* Parse URL params */
var params=new URLSearchParams(window.location.search);
var count=parseInt(params.get("count"))||3;
var actFilter=null;
if(params.get("acts")){actFilter=new Set(params.get("acts").split(",").map(Number))}
var tagFilter=null;
if(params.get("tags")){
  var t=params.get("tags").toUpperCase().split(",");
  tagFilter=new Set();
  for(var i=0;i<zones.length;i++){
    for(var j=0;j<t.length;j++){
      if(t[j]==="TOP"&&topZones.has(i))tagFilter.add(i);
      if(t[j]==="GOOD"&&goodZones.has(i))tagFilter.add(i);
      if(t[j]==="RED"&&redZones.has(i))tagFilter.add(i);
    }
  }
}
var zoneFilter=null;
if(params.get("zones")){zoneFilter=new Set(params.get("zones").split(",").map(Number))}
var resistFilter=null;
if(params.get("resist")){resistFilter=new Set(params.get("resist").toLowerCase().split(","))}
var theme=params.get("theme")||"dark";
var align=params.get("align")||"left";
var scale=parseFloat(params.get("scale"))||1;
var showTitle=params.get("title")!=="0";
var mini=params.get("mini")==="1";
var soundEnabled=params.get("sound")==="1";
var infinityMode=params.get("infinity")==="1";
var INFINITY_BREAK_THRESHOLD=117;
var convictionTypes={"fire":true,"cold":true,"lightning":true};
var lastZoneTs=null;

if(mini)document.body.classList.add("mini");
if(theme==="light")document.body.classList.add("theme-light");
if(align==="center")document.body.classList.add("align-center");
if(align==="right")document.body.classList.add("align-right");
if(scale!==1)document.getElementById("overlay").style.fontSize=scale+"rem";

var getNextPrng=function(seed,mul,inc){return Number(((BigInt(seed)*BigInt(mul)+BigInt(inc))>>BigInt(16))&BigInt(32767))};
var getZone=function(ts,n){
  n=n||0;ts=~~(ts/900e3)*900e3;ts+=900e3*n;
  var a=~~(ts/900000);var b=~~(ts/86400000);var seed=a+b;
  var idx=getNextPrng(seed,214013,2531011)%zones.length;
  return{zone:zones[idx],act:zoneAct[idx],ts:ts,idx:idx};
};
var isVisible=function(idx){
  if(zoneFilter)return zoneFilter.has(idx)&&!isResistBlocked(idx);
  if(actFilter&&!actFilter.has(zoneAct[idx]))return false;
  if(tagFilter&&!tagFilter.has(idx))return false;
  if(isResistBlocked(idx))return false;
  return true;
};
var isResistBlocked=function(idx){
  if(!resistFilter)return false;
  var imm=zoneImmunities[String(idx)]||{};
  for(var res in imm){if(resistFilter.has(res)){var broken=infinityMode&&convictionTypes[res]&&imm[res]<=INFINITY_BREAK_THRESHOLD;if(!broken)return true}}
  return false;
};
var formatCountdown=function(d){
  if(d<=0)return"NOW";
  var s=Math.ceil(d/1000);
  var m=Math.floor(s/60);var sec=s%60;
  if(m<15)return m+"m "+String(sec).padStart(2,"0")+"s";
  if(m<60)return m+"m";
  var h=Math.floor(m/60);return h+"h "+String(m%60).padStart(2,"0")+"m";
};

var overlay=document.getElementById("overlay");
var render=function(){
  var now=Date.now();
  var list=[];
  for(var i=0;list.length<count;i++){
    var info=getZone(now,i);
    if(isVisible(info.idx))list.push(info);
    if(i>500)break;
  }
  var html="";
  if(showTitle)html+='<div class="overlay-title">Corrupted Zones</div>';
  for(var j=0;j<list.length;j++){
    var z=list[j];
    var isLive=now>=z.ts&&now<z.ts+900e3;
    var diff=z.ts-now;
    var countdown=isLive?formatCountdown(z.ts+900e3-now):formatCountdown(diff);
    var timerClass="timer";
    if(mini){
      if(isLive)timerClass+=" timer-live";
      else if(diff<300e3)timerClass+=" timer-soon";
    }
    html+='<div class="zone-row">';
    if(!mini)html+='<span class="status '+(isLive?"live":"next")+'">'+(isLive?"LIVE":"Next")+'</span>';
    html+='<span class="act-badge act-'+z.act+'">A'+z.act+'</span>';
    if(mini){
      html+='<span class="zone-name-wrap"><span class="zone-name">'+z.zone+'</span>';
      var hasTags=topZones.has(z.idx)||goodZones.has(z.idx)||redZones.has(z.idx);
      if(hasTags){
        html+='<span class="zone-tags">';
        if(topZones.has(z.idx))html+='<span class="tag tag-top">TOP</span>';
        if(goodZones.has(z.idx))html+='<span class="tag tag-good">GOOD</span>';
        if(redZones.has(z.idx))html+='<span class="tag tag-red">RED</span>';
        html+='</span>';
      }
      html+='</span>';
    }else{
      html+='<span class="zone-name">'+z.zone+'</span>';
      if(topZones.has(z.idx))html+='<span class="tag tag-top">TOP</span>';
      if(goodZones.has(z.idx))html+='<span class="tag tag-good">GOOD</span>';
      if(redZones.has(z.idx))html+='<span class="tag tag-red">RED</span>';
      var imm=zoneImmunities[String(z.idx)]||{};
      for(var res in imm){var broken=infinityMode&&convictionTypes[res]&&imm[res]<=INFINITY_BREAK_THRESHOLD;html+='<span class="immune immune-'+res+(broken?" broken":"")+'">'+res.charAt(0).toUpperCase()+'</span>'}
    }
    html+='<span class="'+timerClass+'">'+countdown+'</span>';
    html+='</div>';
  }
  overlay.innerHTML=html;
};
render();

// --- Sound notification for zone rotations ---
var playNotificationSound = function() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var playTone = function(freq, start, duration) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.3, ctx.currentTime + start);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + start + duration);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + duration);
    };
    playTone(523.25, 0, 0.15);
    playTone(659.25, 0.15, 0.15);
    playTone(783.99, 0.3, 0.3);
  } catch (e) { /* AudioContext not available */ }
};

setInterval(function() {
  render();
  if (!soundEnabled) return;
  var now = Date.now();
  var currentZoneTs = Math.floor(now / 900000) * 900000;
  if (lastZoneTs === null) { lastZoneTs = currentZoneTs; return; }
  if (currentZoneTs !== lastZoneTs) {
    lastZoneTs = currentZoneTs;
    playNotificationSound();
  }
}, 1000);
})();
</script>
</body>
</html>
