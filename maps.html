<script>
// Build modals dynamically from map sections to avoid repetition
document.addEventListener('DOMContentLoaded', function () {
	const imgs = document.querySelectorAll('div[title="mappath"] img');
	imgs.forEach(function (img) {
		const btn = img.previousElementSibling ? img.parentElement.querySelector('button[data-bs-target]') : null;
		if (!btn) return;
		const modalId = btn.getAttribute('data-bs-target').replace('#', '');
		const modal = document.createElement('div');
		modal.className = 'modal fade';
		modal.id = modalId;
		modal.setAttribute('tabindex', '-1');
		modal.setAttribute('aria-hidden', 'true');
		modal.innerHTML =
			'<div class="modal-dialog modal-fullwidth modal-dialog-centered">' +
			'<div class="modal-content">' +
			'<div class="modal-header">' +
			'<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>' +
			'</div>' +
			'<div class="modal-body">' +
			'<img src="' + img.src + '" class="map-img-fluid" alt="' + img.alt + '">' +
			'</div></div></div>';
		document.body.appendChild(modal);
	});
});
</script>

<!-- Map filter script -->
<script>
document.querySelectorAll('input[name="mapDisplay"]').forEach(function (radio) {
	radio.addEventListener('change', function () {
		var sections = document.querySelectorAll('.map-section');
		if (this.value === 'all') {
			sections.forEach(function (s) { s.style.display = ''; });
		} else {
			sections.forEach(function (s) { s.style.display = 'none'; });
			var target = document.getElementById(this.value);
			if (target) target.style.display = '';
		}
	});
});
</script>

<!-- Map size script -->
<script>
document.querySelectorAll('input[name="mapSize"]').forEach(function (radio) {
	radio.addEventListener('change', function () {
		var mapDivs = document.querySelectorAll('div[title="mappath"]');
		mapDivs.forEach(function (div) {
			div.classList.remove('col-md-4', 'col-md-6', 'col-md-12');
			if (this.value === 'Small') div.classList.add('col-md-4');
			else if (this.value === 'Medium') div.classList.add('col-md-6');
			else if (this.value === 'Large') div.classList.add('col-md-12');
		}, this);
	});
});
</script>
