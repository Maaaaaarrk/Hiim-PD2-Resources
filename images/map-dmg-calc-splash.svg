<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 499" width="800" height="499">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#0f0a14"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c7a968;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#c7a968;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>
  <rect width="800" height="499" fill="url(#bg)"/>
  <circle cx="400" cy="200" r="200" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Table header -->
  <rect x="100" y="70" width="600" height="35" rx="3" fill="#1a1510" stroke="#3a3228" stroke-width="1"/>
  <text x="160" y="93" text-anchor="middle" fill="#c7a968" font-size="12" font-family="sans-serif" font-weight="600">Monster</text>
  <text x="280" y="93" text-anchor="middle" fill="#ff6633" font-size="12" font-family="sans-serif" font-weight="600">Fire</text>
  <text x="360" y="93" text-anchor="middle" fill="#ffcc00" font-size="12" font-family="sans-serif" font-weight="600">Light</text>
  <text x="440" y="93" text-anchor="middle" fill="#6699ff" font-size="12" font-family="sans-serif" font-weight="600">Cold</text>
  <text x="520" y="93" text-anchor="middle" fill="#bb88ff" font-size="12" font-family="sans-serif" font-weight="600">Magic</text>
  <text x="610" y="93" text-anchor="middle" fill="#d4b44a" font-size="12" font-family="sans-serif" font-weight="600">Physical</text>

  <!-- Table rows -->
  <rect x="100" y="110" width="600" height="30" rx="0" fill="#0f0c08"/>
  <rect x="100" y="145" width="600" height="30" rx="0" fill="#141008"/>
  <rect x="100" y="180" width="600" height="30" rx="0" fill="#0f0c08"/>
  <rect x="100" y="215" width="600" height="30" rx="0" fill="#141008"/>
  <rect x="100" y="250" width="600" height="30" rx="0" fill="#0f0c08"/>

  <!-- Monster names -->
  <text x="160" y="130" text-anchor="middle" fill="#b09872" font-size="11" font-family="sans-serif">Flesh Hunter</text>
  <text x="160" y="165" text-anchor="middle" fill="#b09872" font-size="11" font-family="sans-serif">Doom Knight</text>
  <text x="160" y="200" text-anchor="middle" fill="#b09872" font-size="11" font-family="sans-serif">Venom Lord</text>
  <text x="160" y="235" text-anchor="middle" fill="#b09872" font-size="11" font-family="sans-serif">Balrog</text>
  <text x="160" y="270" text-anchor="middle" fill="#b09872" font-size="11" font-family="sans-serif">Pit Lord</text>

  <!-- Resistance values -->
  <text x="280" y="130" text-anchor="middle" fill="#ff6633" font-size="11" font-family="sans-serif">75</text>
  <text x="360" y="130" text-anchor="middle" fill="#ffcc00" font-size="11" font-family="sans-serif">0</text>
  <text x="440" y="130" text-anchor="middle" fill="#6699ff" font-size="11" font-family="sans-serif">50</text>
  <text x="520" y="130" text-anchor="middle" fill="#bb88ff" font-size="11" font-family="sans-serif">0</text>
  <text x="610" y="130" text-anchor="middle" fill="#d4b44a" font-size="11" font-family="sans-serif">33</text>

  <text x="280" y="165" text-anchor="middle" fill="#ff3030" font-size="11" font-family="sans-serif" font-weight="700">110</text>
  <text x="360" y="165" text-anchor="middle" fill="#ffcc00" font-size="11" font-family="sans-serif">40</text>
  <text x="440" y="165" text-anchor="middle" fill="#6699ff" font-size="11" font-family="sans-serif">75</text>
  <text x="520" y="165" text-anchor="middle" fill="#bb88ff" font-size="11" font-family="sans-serif">0</text>
  <text x="610" y="165" text-anchor="middle" fill="#d4b44a" font-size="11" font-family="sans-serif">50</text>

  <text x="280" y="200" text-anchor="middle" fill="#ff6633" font-size="11" font-family="sans-serif">75</text>
  <text x="360" y="200" text-anchor="middle" fill="#ffcc00" font-size="11" font-family="sans-serif">75</text>
  <text x="440" y="200" text-anchor="middle" fill="#6699ff" font-size="11" font-family="sans-serif">0</text>
  <text x="520" y="200" text-anchor="middle" fill="#bb88ff" font-size="11" font-family="sans-serif">50</text>
  <text x="610" y="200" text-anchor="middle" fill="#d4b44a" font-size="11" font-family="sans-serif">25</text>

  <!-- Damage source sidebar -->
  <rect x="100" y="300" width="250" height="80" rx="5" fill="#111008" stroke="#3a3228" stroke-width="1"/>
  <text x="120" y="322" fill="#c7a968" font-size="13" font-family="sans-serif" font-weight="600">Damage Sources</text>
  <text x="120" y="345" fill="#ff6633" font-size="11" font-family="sans-serif">Fire: 4,500</text>
  <text x="120" y="365" fill="#6699ff" font-size="11" font-family="sans-serif">Cold: 2,200</text>
  <text x="250" y="345" fill="#ffcc00" font-size="11" font-family="sans-serif">Light: 3,800</text>
  <text x="250" y="365" fill="#d4b44a" font-size="11" font-family="sans-serif">Phys: 1,500</text>

  <!-- Map selector -->
  <rect x="400" y="300" width="300" height="80" rx="5" fill="#111008" stroke="#3a3228" stroke-width="1"/>
  <text x="420" y="322" fill="#c7a968" font-size="13" font-family="sans-serif" font-weight="600">Selected Maps</text>
  <rect x="420" y="332" width="12" height="12" rx="2" fill="#10b981"/>
  <text x="440" y="343" fill="#b09872" font-size="11" font-family="sans-serif">Frigid Plateau</text>
  <rect x="420" y="352" width="12" height="12" rx="2" fill="#10b981"/>
  <text x="440" y="363" fill="#b09872" font-size="11" font-family="sans-serif">Dim Cellar</text>
  <rect x="560" y="332" width="12" height="12" rx="2" fill="#10b981"/>
  <text x="580" y="343" fill="#b09872" font-size="11" font-family="sans-serif">Bastion Keep</text>

  <!-- Title -->
  <text x="400" y="430" text-anchor="middle" fill="#dee2e6" font-size="37" font-family="sans-serif" font-weight="700" letter-spacing="2">MAP DAMAGE CALC</text>
  <text x="400" y="467" text-anchor="middle" fill="#9ca3af" font-size="18" font-family="sans-serif">Monster Resistance &amp; DPS Calculator</text>
</svg>
