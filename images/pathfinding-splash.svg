<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 499" width="800" height="499">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#1a1510"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b44a;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#c0b377;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <rect width="800" height="499" fill="url(#bg)"/>
  <circle cx="400" cy="200" r="160" fill="url(#gold)" filter="url(#blur)"/>

  <!-- Grid of tiles representing indoor map -->
  <!-- Row 1 -->
  <rect x="310" y="80" width="60" height="60" rx="2" fill="#111008" stroke="#3a3228" stroke-width="1.5"/>
  <rect x="380" y="80" width="60" height="60" rx="2" fill="#111008" stroke="#3a3228" stroke-width="1.5"/>

  <!-- Row 2 -->
  <rect x="240" y="150" width="60" height="60" rx="2" fill="#111008" stroke="#3a3228" stroke-width="1.5"/>
  <rect x="310" y="150" width="60" height="60" rx="2" fill="#1a1510" stroke="#5a4a2a" stroke-width="1.5"/>
  <rect x="380" y="150" width="60" height="60" rx="2" fill="#111008" stroke="#3a3228" stroke-width="1.5"/>
  <rect x="450" y="150" width="60" height="60" rx="2" fill="#111008" stroke="#3a3228" stroke-width="1.5"/>

  <!-- Row 3 -->
  <rect x="240" y="220" width="60" height="60" rx="2" fill="#111008" stroke="#3a3228" stroke-width="1.5"/>
  <rect x="310" y="220" width="60" height="60" rx="2" fill="#111008" stroke="#3a3228" stroke-width="1.5"/>
  <rect x="380" y="220" width="60" height="60" rx="2" fill="#111008" stroke="#3a3228" stroke-width="1.5"/>
  <rect x="450" y="220" width="60" height="60" rx="2" fill="#111008" stroke="#3a3228" stroke-width="1.5"/>
  <rect x="520" y="220" width="60" height="60" rx="2" fill="#111008" stroke="#3a3228" stroke-width="1.5"/>

  <!-- Row 4 -->
  <rect x="380" y="290" width="60" height="60" rx="2" fill="#111008" stroke="#3a3228" stroke-width="1.5"/>
  <rect x="450" y="290" width="60" height="60" rx="2" fill="#111008" stroke="#3a3228" stroke-width="1.5"/>

  <!-- Entry marker (green diamond) -->
  <polygon points="270,180 280,170 290,180 280,190" fill="#4ade80" filter="url(#glow)"/>
  <text x="270" y="165" text-anchor="middle" fill="#4ade80" font-size="10" font-family="sans-serif" font-weight="600">ENTRY</text>

  <!-- Exit marker (red diamond) -->
  <polygon points="480,320 490,310 500,320 490,330" fill="#f87171" filter="url(#glow)"/>
  <text x="490" y="345" text-anchor="middle" fill="#f87171" font-size="10" font-family="sans-serif" font-weight="600">EXIT</text>

  <!-- Clockwise arrow path -->
  <path d="M 340,120 Q 430,90 440,160 Q 450,230 530,250 Q 520,300 460,310" fill="none" stroke="#d4b44a" stroke-width="2.5" stroke-dasharray="6,4" opacity="0.7"/>
  <polygon points="460,305 465,315 455,315" fill="#d4b44a" opacity="0.7"/>
  <text x="490" y="140" fill="#d4b44a" font-size="11" font-family="sans-serif" font-weight="600" opacity="0.8">clockwise</text>

  <!-- Waypoint marker -->
  <circle cx="340" cy="180" r="8" fill="none" stroke="#fbbf24" stroke-width="2"/>
  <circle cx="340" cy="180" r="3" fill="#fbbf24"/>

  <!-- Title -->
  <text x="400" y="420" text-anchor="middle" fill="#dee2e6" font-size="37" font-family="sans-serif" font-weight="700" letter-spacing="2">PATHFINDING GUIDE</text>
  <text x="400" y="458" text-anchor="middle" fill="#9ca3af" font-size="18" font-family="sans-serif">Map Patterns &amp; Navigation Tips</text>
</svg>
