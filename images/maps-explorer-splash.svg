<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 499" width="800" height="499">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#0a1018"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c7a968;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#c7a968;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>
  <rect width="800" height="499" fill="url(#bg)"/>
  <circle cx="400" cy="200" r="200" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Category buttons -->
  <rect x="160" y="60" width="220" height="45" rx="6" fill="#1a1510" stroke="#c7a968" stroke-width="1.5"/>
  <text x="270" y="88" text-anchor="middle" fill="#c7a968" font-size="16" font-family="sans-serif" font-weight="600">Campaign (Acts 1-5)</text>

  <rect x="420" y="60" width="220" height="45" rx="6" fill="#1a1510" stroke="#c7a968" stroke-width="1.5"/>
  <text x="530" y="88" text-anchor="middle" fill="#c7a968" font-size="16" font-family="sans-serif" font-weight="600">Endgame (Maps)</text>

  <!-- Map tier cards -->
  <rect x="80" y="130" width="190" height="220" rx="5" fill="#111008" stroke="#3a3228" stroke-width="1"/>
  <rect x="80" y="130" width="190" height="32" rx="5" fill="#1a1510"/>
  <text x="175" y="151" text-anchor="middle" fill="#10b981" font-size="14" font-family="sans-serif" font-weight="700">T1 Maps</text>
  <text x="100" y="180" fill="#b09872" font-size="11" font-family="sans-serif">Frigid Plateau</text>
  <text x="100" y="200" fill="#b09872" font-size="11" font-family="sans-serif">Musty Crypt</text>
  <text x="100" y="220" fill="#b09872" font-size="11" font-family="sans-serif">Dim Cellar</text>
  <text x="100" y="240" fill="#b09872" font-size="11" font-family="sans-serif">Burnt Forest</text>
  <text x="100" y="260" fill="#b09872" font-size="11" font-family="sans-serif">Ruined Citadel</text>

  <rect x="305" y="130" width="190" height="220" rx="5" fill="#111008" stroke="#3a3228" stroke-width="1"/>
  <rect x="305" y="130" width="190" height="32" rx="5" fill="#1a1510"/>
  <text x="400" y="151" text-anchor="middle" fill="#f59e0b" font-size="14" font-family="sans-serif" font-weight="700">T2 Maps</text>
  <text x="325" y="180" fill="#b09872" font-size="11" font-family="sans-serif">Bastion Keep</text>
  <text x="325" y="200" fill="#b09872" font-size="11" font-family="sans-serif">Desecrated Temple</text>
  <text x="325" y="220" fill="#b09872" font-size="11" font-family="sans-serif">Tomb of Zoltun</text>
  <text x="325" y="240" fill="#b09872" font-size="11" font-family="sans-serif">Arreat Plateau</text>
  <text x="325" y="260" fill="#b09872" font-size="11" font-family="sans-serif">Lost Temple</text>

  <rect x="530" y="130" width="190" height="220" rx="5" fill="#111008" stroke="#3a3228" stroke-width="1"/>
  <rect x="530" y="130" width="190" height="32" rx="5" fill="#1a1510"/>
  <text x="625" y="151" text-anchor="middle" fill="#ef4444" font-size="14" font-family="sans-serif" font-weight="700">T3 Maps</text>
  <text x="550" y="180" fill="#b09872" font-size="11" font-family="sans-serif">Blood Moon</text>
  <text x="550" y="200" fill="#b09872" font-size="11" font-family="sans-serif">River of Blood</text>
  <text x="550" y="220" fill="#b09872" font-size="11" font-family="sans-serif">Halls of Vaught</text>
  <text x="550" y="240" fill="#b09872" font-size="11" font-family="sans-serif">Throne of Insanity</text>
  <text x="550" y="260" fill="#b09872" font-size="11" font-family="sans-serif">Voidstone</text>

  <!-- Monster info preview -->
  <rect x="80" y="360" width="640" height="30" rx="3" fill="#1a1510" stroke="#3a3228" stroke-width="1"/>
  <text x="120" y="380" fill="#c7a968" font-size="11" font-family="sans-serif" font-weight="600">Monster</text>
  <text x="260" y="380" fill="#c7a968" font-size="11" font-family="sans-serif" font-weight="600">HP</text>
  <text x="360" y="380" fill="#ff6633" font-size="11" font-family="sans-serif" font-weight="600">Fire</text>
  <text x="430" y="380" fill="#ffcc00" font-size="11" font-family="sans-serif" font-weight="600">Light</text>
  <text x="500" y="380" fill="#6699ff" font-size="11" font-family="sans-serif" font-weight="600">Cold</text>
  <text x="570" y="380" fill="#bb88ff" font-size="11" font-family="sans-serif" font-weight="600">Magic</text>
  <text x="650" y="380" fill="#d4b44a" font-size="11" font-family="sans-serif" font-weight="600">Phys</text>

  <!-- Title -->
  <text x="400" y="430" text-anchor="middle" fill="#dee2e6" font-size="37" font-family="sans-serif" font-weight="700" letter-spacing="2">MAPS EXPLORER</text>
  <text x="400" y="467" text-anchor="middle" fill="#9ca3af" font-size="18" font-family="sans-serif">PD2 Maps, Monsters &amp; Zone Data</text>
</svg>
